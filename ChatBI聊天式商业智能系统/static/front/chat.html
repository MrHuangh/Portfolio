<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chat Demo</title>
    <!-- ElementUI 样式 -->
    <link rel="stylesheet" href="../element-ui/lib/theme-chalk/index.css">
    <!-- Vue2 -->
    <script src="../js/vue.js"></script>
    <!-- ElementUI -->
    <script src="../element-ui/lib/index.js"></script>
    <!-- Marked 和 DOMPurify -->
    <script src="../marked/marked.min.js"></script>
    <script src="../dompurify/dist/purify.min.js"></script>
    <script src="../js/echarts-5.3.3.js"></script>
    <script src="../axios/dist/axios.js"></script>
    <style>
        body {
            margin: 0;
            background: #f5f5f5;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 400px; /* 固定高度 */
            border-bottom: 1px solid #ddd;
            background: #f9f9f9;
        }

        .message {
            max-width: 70%;
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            word-wrap: break-word;
        }

        /* 根据 class 控制左右和样式 */
        .message.user {
            align-self: flex-end;
            background: #409EFF;
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background: #fff;
            border: 1px solid #ddd;
            color: black;
        }

        #input-area {
            border-top: 1px solid #ddd;
            padding: 10px;
            background: #fff;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end; /* 按钮对齐到输入框底部 */
        }

        .input-wrapper .el-input {
            flex: 1; /* 占满剩余空间 */
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div id="app">
    <div id="chat-container">
        <!-- 消息区 -->
        <div id="messages">
            <div v-for="(msg, index) in messages" :key="index" class="message" :class="msg.role">

                <!-- 文本 -->
                <div v-if="msg.type === 'text'" v-html="msg.html || renderMarkdown(msg.content)"></div>

                <!-- 图表 -->
                <div v-if="msg.type === 'chart'" :id="'msg' + index" style="width: 600px; height: 500px;"></div>

            </div>
        </div>


        <!-- 输入区 -->
        <div id="input-area">
            <div class="input-wrapper">
                <el-input
                        type="textarea"
                        v-model="input"
                        :rows="2"
                        placeholder="输入消息..."
                        @keydown.enter.native.prevent="sendMessage"
                ></el-input>
                <el-button type="primary" style="height: 53px" @click="sendMessage">发送</el-button>
            </div>
        </div>
    </div>
</div>

<script>
    new Vue({
        delimiters: ['[{', '}]'],
        el: '#app',
        data() {
            return {
                input: '',//用户输入的内容
                messages: [//聊天记录--格式
                    {
                        role: 'assistant',//角色名称 assistant user
                        type: 'text',//消息类型  text chart
                       content: '你好，我是 AI 助手，可以帮你解答问题~'//消息内容
                    }
                ],
            }
        },
        methods: {
            scrollToBottom() { // 对话窗口可以实现滑动
                this.$nextTick(() => {
                    const container = document.getElementById('messages');
                    container.scrollTop = container.scrollHeight;
                });
            },
            sendMessage() {
                //判断用户输入的内容
                if (this.input.trim() === ''){
                    return;
                }
                //定义一个变量 用来保存当前输入
                let question = this.input.trim();
                this.input = '';
                let aiIndex = this.messages.length;
                this.$set(this.messages,aiIndex ,{
                    role: 'user',
                    type: 'text',
                    content: question
                });
                this.$set(this.messages,aiIndex + 1,{
                    role: 'assistant',
                    type: 'text',
                    content: '正在思考...'}
                );
                this.scrollToBottom();
                axios({
                    url: 'http://localhost:8000/chat/',
                    params:{
                        question:question,
                    }
                }).then(res=>{
                    console.log(res.data)
                    //取出content内容
                    let content = res.data.content
                    //需要什么图
                    if (question.includes('柱状图') || question.includes('饼图') || question.includes('折线图')){
                        //初始化
                        this.$set(this.messages,aiIndex + 1,{
                            role: 'assistant',
                            type: 'chart',
                            content: content});
                        this.$nextTick(()=>{
                            let chart = echarts.init(
                                document.getElementById("msg" + (aiIndex + 1))
                            );
                            chart.setOption(JSON.parse(content))
                        })
                    } else{
                        this.$set(this.messages, aiIndex + 1, {
                            role: 'assistant',
                            type: 'text',
                            content: content
                        });
                    }
                    this.scrollToBottom();
                });
            },
            renderMarkdown(text) { // markdown 解析
                const rawHtml = marked.parse(text);
                return DOMPurify.sanitize(rawHtml);
            }
        }
    });
</script>
</body>
</html>
