<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>AI 智能检测</title>
	<style>
		/* ===== Reset & Base ===== */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
			background: linear-gradient(180deg, #0f0f23 0%, #1a1a3e 50%, #0f0f23 100%);
			color: #ffffff;
			min-height: 100vh;
			-webkit-font-smoothing: antialiased;
		}

		/* ===== Container ===== */
		.app-container {
			max-width: 480px;
			margin: 0 auto;
			padding: 32px 20px;
			min-height: 100vh;
		}

		/* ===== Header ===== */
		.header {
			text-align: center;
			padding: 40px 0 48px;
			position: relative;
			overflow: hidden;
		}

		.header::before {
			content: '';
			position: absolute;
			top: -100px;
			left: 50%;
			transform: translateX(-50%);
			width: 400px;
			height: 400px;
			background: radial-gradient(circle, rgba(102, 126, 234, 0.12) 0%, transparent 70%);
			pointer-events: none;
		}

		.header-title {
			font-size: 36px;
			font-weight: 700;
			letter-spacing: 3px;
			text-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
			position: relative;
			z-index: 1;
		}

		.header-subtitle {
			font-size: 14px;
			color: rgba(255, 255, 255, 0.45);
			margin-top: 8px;
			letter-spacing: 1px;
			position: relative;
			z-index: 1;
		}

		/* ===== Upload Section ===== */
		.section-label {
			display: flex;
			align-items: center;
			margin-bottom: 16px;
			gap: 8px;
		}

		.section-label .icon {
			font-size: 24px;
		}

		.section-label .text {
			font-size: 18px;
			font-weight: 600;
			color: rgba(255, 255, 255, 0.9);
		}

		/* ===== Upload Area ===== */
		.upload-area {
			width: 100%;
			min-height: 280px;
			border-radius: 16px;
			overflow: hidden;
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0.02) 100%);
			border: 2px dashed rgba(255, 255, 255, 0.12);
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			transition: all 0.3s ease;
			position: relative;
		}

		.upload-area:hover {
			border-color: rgba(102, 126, 234, 0.4);
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
		}

		.upload-area.has-image {
			border-style: solid;
			border-color: rgba(102, 126, 234, 0.3);
		}

		.upload-placeholder {
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 40px 20px;
		}

		.upload-icon {
			width: 80px;
			height: 80px;
			border-radius: 50%;
			background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
			border: 2px solid rgba(102, 126, 234, 0.3);
			display: flex;
			align-items: center;
			justify-content: center;
			margin-bottom: 16px;
			font-size: 36px;
			color: rgba(102, 126, 234, 0.6);
		}

		.upload-text {
			font-size: 16px;
			color: rgba(255, 255, 255, 0.6);
			font-weight: 500;
		}

		.upload-hint {
			font-size: 13px;
			color: rgba(255, 255, 255, 0.25);
			margin-top: 6px;
		}

		.preview-image {
			width: 100%;
			display: block;
		}

		.change-btn {
			position: absolute;
			top: 12px;
			right: 12px;
			background: rgba(0, 0, 0, 0.6);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			padding: 6px 16px;
			border-radius: 20px;
			border: 1px solid rgba(255, 255, 255, 0.12);
			color: rgba(255, 255, 255, 0.8);
			font-size: 12px;
			cursor: pointer;
			transition: all 0.2s;
		}

		.change-btn:hover {
			background: rgba(0, 0, 0, 0.8);
		}

		/* ===== Action Buttons ===== */
		.action-row {
			display: flex;
			gap: 12px;
			margin-top: 16px;
		}

		.action-btn {
			flex: 1;
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 8px;
			padding: 14px;
			border-radius: 12px;
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
			border: 1px solid rgba(255, 255, 255, 0.08);
			color: rgba(255, 255, 255, 0.8);
			font-size: 15px;
			cursor: pointer;
			transition: all 0.3s;
			font-weight: 500;
		}

		.action-btn:hover {
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.05) 100%);
		}

		.action-btn:active {
			transform: scale(0.97);
		}

		/* ===== Detect Button ===== */
		.detect-section {
			margin-top: 28px;
		}

		.detect-btn {
			width: 100%;
			padding: 18px;
			border-radius: 50px;
			border: none;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: #ffffff;
			font-size: 18px;
			font-weight: 600;
			letter-spacing: 2px;
			cursor: pointer;
			transition: all 0.3s ease;
			box-shadow: 0 8px 32px rgba(102, 126, 234, 0.35);
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 10px;
		}

		.detect-btn:hover:not(:disabled) {
			box-shadow: 0 12px 40px rgba(102, 126, 234, 0.45);
			transform: translateY(-2px);
		}

		.detect-btn:active:not(:disabled) {
			transform: scale(0.97);
		}

		.detect-btn:disabled {
			opacity: 0.4;
			cursor: not-allowed;
			box-shadow: none;
		}

		/* Loading Spinner */
		.spinner {
			display: inline-block;
			width: 20px;
			height: 20px;
			border: 3px solid rgba(255, 255, 255, 0.3);
			border-top-color: #ffffff;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		/* ===== Result Section ===== */
		.result-section {
			margin-top: 28px;
			display: none;
		}

		.result-section.show {
			display: block;
			animation: fadeIn 0.5s ease;
		}

		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(20px); }
			to { opacity: 1; transform: translateY(0); }
		}

		.result-image-wrapper {
			width: 100%;
			border-radius: 16px;
			overflow: hidden;
			background: rgba(0, 0, 0, 0.3);
			border: 1px solid rgba(255, 255, 255, 0.08);
			position: relative;
		}

		.result-image-wrapper img {
			width: 100%;
			display: block;
		}

		/* ===== Info Card ===== */
		.info-card {
			margin-top: 20px;
			padding: 24px;
			border-radius: 16px;
			background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
			border: 1px solid rgba(255, 255, 255, 0.08);
		}

		.info-card-header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			margin-bottom: 16px;
			padding-bottom: 16px;
			border-bottom: 1px solid rgba(255, 255, 255, 0.06);
		}

		.info-card-title {
			font-size: 17px;
			font-weight: 600;
			color: rgba(255, 255, 255, 0.9);
		}

		.info-badge {
			padding: 4px 14px;
			border-radius: 20px;
			background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
			border: 1px solid rgba(102, 126, 234, 0.3);
			font-size: 12px;
			color: rgba(102, 126, 234, 0.9);
			font-weight: 600;
		}

		.info-row {
			display: flex;
			justify-content: space-between;
			padding: 10px 0;
		}

		.info-label {
			font-size: 15px;
			color: rgba(255, 255, 255, 0.4);
		}

		.info-value {
			font-size: 15px;
			color: rgba(255, 255, 255, 0.85);
			font-weight: 500;
		}

		.status-success { color: #2ed573; }

		/* ===== Footer ===== */
		.footer {
			margin-top: 48px;
			padding-bottom: 32px;
		}

		.footer-item {
			display: flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 10px;
		}

		.footer-dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: linear-gradient(135deg, #667eea, #764ba2);
			flex-shrink: 0;
		}

		.footer-text {
			font-size: 13px;
			color: rgba(255, 255, 255, 0.25);
		}

		/* ===== Toast ===== */
		.toast {
			position: fixed;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: rgba(0, 0, 0, 0.85);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			color: #fff;
			padding: 24px 32px;
			border-radius: 16px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			z-index: 1000;
			display: none;
			text-align: center;
			min-width: 280px;
		}

		.toast.show {
			display: block;
			animation: fadeIn 0.3s ease;
		}

		.toast-title {
			font-size: 18px;
			font-weight: 600;
			margin-bottom: 8px;
		}

		.toast-message {
			font-size: 14px;
			color: rgba(255, 255, 255, 0.6);
			line-height: 1.5;
		}

		.toast-btn {
			margin-top: 16px;
			padding: 10px 40px;
			border-radius: 40px;
			border: none;
			background: linear-gradient(135deg, #667eea, #764ba2);
			color: #fff;
			font-size: 14px;
			font-weight: 600;
			cursor: pointer;
		}

		/* ===== Hidden file input ===== */
		#fileInput {
			display: none;
		}

		/* ===== Responsive ===== */
		@media (max-width: 400px) {
			.app-container { padding: 20px 16px; }
			.header-title { font-size: 28px; }
			.header { padding: 24px 0 32px; }
		}
	</style>
</head>
<body>
	<div class="app-container">
		<!-- Header -->
		<div class="header">
			<div class="header-title">AI 智能检测</div>
			<div class="header-subtitle">基于 YOLOv11 深度学习模型</div>
		</div>

		<!-- Upload Section -->
		<div class="upload-section">
			<div class="section-label">
				<span class="icon">📷</span>
				<span class="text">选择图片</span>
			</div>

			<div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
				<div class="upload-placeholder" id="placeholder">
					<div class="upload-icon">+</div>
					<div class="upload-text">点击选择图片</div>
					<div class="upload-hint">支持 JPG / PNG 格式</div>
				</div>
				<img id="previewImage" class="preview-image" style="display:none" />
				<div class="change-btn" id="changeBtn" style="display:none" onclick="event.stopPropagation();document.getElementById('fileInput').click()">重新选择</div>
			</div>

			<input type="file" id="fileInput" accept="image/*" onchange="handleFileSelect(event)" />

			<div class="action-row">
				<button class="action-btn" onclick="document.getElementById('fileInput').click()">🖼 相册</button>
				<button class="action-btn" onclick="openCamera()">📸 拍照</button>
			</div>
		</div>

		<!-- Detect Button -->
		<div class="detect-section">
			<button class="detect-btn" id="detectBtn" onclick="startDetect()" disabled>
				🔍 开始检测
			</button>
		</div>

		<!-- Result Section -->
		<div class="result-section" id="resultSection">
			<div class="section-label">
				<span class="icon">📊</span>
				<span class="text">检测结果</span>
			</div>

			<div class="result-image-wrapper">
				<img id="resultImage" src="" alt="检测结果" />
			</div>

			<div class="info-card">
				<div class="info-card-header">
					<span class="info-card-title">检测概览</span>
					<span class="info-badge">YOLOv11</span>
				</div>
				<div class="info-row">
					<span class="info-label">检测状态</span>
					<span class="info-value status-success">✓ 检测完成</span>
				</div>
				<div class="info-row">
					<span class="info-label">检测时间</span>
					<span class="info-value" id="detectTime">--:--:--</span>
				</div>
				<div class="info-row">
					<span class="info-label">模型类型</span>
					<span class="info-value">YOLOv11 Nano</span>
				</div>
			</div>
		</div>

		<!-- Footer -->
		<div class="footer">
			<div class="footer-item">
				<span class="footer-dot"></span>
				<span class="footer-text">支持口罩检测 / 鸟类</span>
			</div>
			<div class="footer-item">
				<span class="footer-dot"></span>
				<span class="footer-text">实时 AI 推理，秒级返回结果</span>
			</div>
			<div class="footer-item">
				<span class="footer-dot"></span>
				<span class="footer-text">后端地址：http://localhost:5000</span>
			</div>
		</div>
	</div>

	<!-- Toast -->
	<div class="toast" id="toast">
		<div class="toast-title" id="toastTitle">⚠️ 检测失败</div>
		<div class="toast-message" id="toastMessage">错误信息</div>
		<button class="toast-btn" onclick="closeToast()">知道了</button>
	</div>

	<script>
		// ==== 配置 ====
		const API_BASE = 'http://localhost:5000';

		// ==== 状态 ====
		let selectedFile = null;
		let selectedFileUrl = null;

		// ==== 文件选择处理 ====
		function handleFileSelect(event) {
			const file = event.target.files[0];
			if (!file) return;
			selectedFile = file;
			selectedFileUrl = URL.createObjectURL(file);
			showPreview(selectedFileUrl);
		}

		function openCamera() {
			const input = document.getElementById('fileInput');
			input.setAttribute('capture', 'environment');
			input.click();
			// 复位
			setTimeout(() => input.removeAttribute('capture'), 1000);
		}

		function showPreview(url) {
			const placeholder = document.getElementById('placeholder');
			const img = document.getElementById('previewImage');
			const changeBtn = document.getElementById('changeBtn');
			const uploadArea = document.getElementById('uploadArea');

			placeholder.style.display = 'none';
			img.src = url;
			img.style.display = 'block';
			changeBtn.style.display = 'block';
			uploadArea.classList.add('has-image');

			document.getElementById('detectBtn').disabled = false;
		}

		// ==== 开始检测 ====
		async function startDetect() {
			if (!selectedFile) return;

			const btn = document.getElementById('detectBtn');
			const originalText = btn.innerHTML;

			// Loading状态
			btn.disabled = true;
			btn.innerHTML = '<span class="spinner"></span> AI 检测中...';

			try {
				const formData = new FormData();
				formData.append('my_img', selectedFile);

				const response = await fetch(`${API_BASE}/ai_detect`, {
					method: 'POST',
					body: formData
				});

				if (!response.ok) {
					throw new Error(`服务器返回状态码 ${response.status}`);
				}

				const resultUrl = await response.text();

				// 显示结果
				showResult(resultUrl);

			} catch (err) {
				let msg = err.message;
				if (err.message.includes('Failed to fetch') || err.message.includes('NetworkError')) {
					msg = '无法连接到服务器，请确保 Flask 后端已启动 (http://localhost:5000)';
				}
				showToast('⚠️ 检测失败', msg);
			} finally {
				btn.disabled = false;
				btn.innerHTML = originalText;
			}
		}

		// ==== 显示结果 ====
		function showResult(url) {
			const section = document.getElementById('resultSection');
			const resultImg = document.getElementById('resultImage');
			const timeEl = document.getElementById('detectTime');

			// 如果是相对路径，拼接完整URL
			if (url.startsWith('/')) {
				url = `${API_BASE}${url}`;
			} else if (url.startsWith('runs/')) {
				url = `${API_BASE}/${url}`;
			}

			resultImg.src = url;
			timeEl.textContent = new Date().toLocaleTimeString('zh-CN', { hour12: false });
			section.classList.add('show');

			// 滚动到结果区域
			setTimeout(() => {
				section.scrollIntoView({ behavior: 'smooth', block: 'start' });
			}, 300);
		}

		// ==== Toast ====
		function showToast(title, message) {
			document.getElementById('toastTitle').textContent = title;
			document.getElementById('toastMessage').textContent = message;
			document.getElementById('toast').classList.add('show');
		}

		function closeToast() {
			document.getElementById('toast').classList.remove('show');
		}

		// ==== 文件拖拽支持 ====
		const uploadArea = document.getElementById('uploadArea');
		uploadArea.addEventListener('dragover', (e) => {
			e.preventDefault();
			uploadArea.style.borderColor = 'rgba(102, 126, 234, 0.6)';
		});
		uploadArea.addEventListener('dragleave', () => {
			uploadArea.style.borderColor = 'rgba(255, 255, 255, 0.12)';
		});
		uploadArea.addEventListener('drop', (e) => {
			e.preventDefault();
			uploadArea.style.borderColor = 'rgba(255, 255, 255, 0.12)';
			const file = e.dataTransfer.files[0];
			if (file && file.type.startsWith('image/')) {
				selectedFile = file;
				selectedFileUrl = URL.createObjectURL(file);
				showPreview(selectedFileUrl);
			}
		});

		console.log('✅ AI智能检测前端已加载');
		console.log(`🔗 后端地址: ${API_BASE}`);
		console.log('📌 请确保 Flask 后端已启动');
	</script>
</body>
</html>
