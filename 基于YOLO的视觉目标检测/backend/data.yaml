# ============================================
# YOLOv11 数据集配置文件
# 用于工业缺陷检测微调训练
# ============================================
# 使用方法:
#   1. 将你的图片放入 dataset/images/train/ 和 dataset/images/val/
#   2. 对应的标注文件放入 dataset/labels/train/ 和 dataset/labels/val/
#   3. 修改下方 classes 中的类别名称
#   4. 运行: python train.py
# ============================================

# 数据集根目录 (相对于本文件位置)
path: ./dataset
train: images/train
val: images/val

# 类别数量
nc: 3

# 类别名称 (按索引顺序, 与标注文件中的 class_id 对应)
# 例如: 标注文件中 class_id=0 对应 names[0]
names:
  0: scratch    # 划痕
  1: dent       # 凹陷
  2: crack      # 裂纹

# ============================================
# 常见工业缺陷类别参考 (按需替换上面的 names):
#
#   金属表面: scratch, dent, corrosion, crack, stain
#   PCB板:    short_circuit, cold_solder, missing_part, bridge
#   纺织品:   hole, stain, broken_thread, pilling
#   包装:     tear, dent, label_error, seal_broken
# ============================================
